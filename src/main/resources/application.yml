spring:
  application:
    name: school-management
  profiles:
    active: dev # Por defecto arranca con dev (puedes cambiarlo a prod en el server)

---
# ==============================
# Perfil DEV (localhost)
# ==============================
spring:
  config:

    activate:
      on-profile: dev

  datasource:
    url: ${DB_URL}&serverTimezone=America/Argentina/Buenos_Aires
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  springdoc:
     api-docs:
       path: /v3/api-docs
       enabled: true
     swagger-ui:
       path: /swagger-ui.html
       enabled: true
       operationsSorter: method
       tagsSorter: alpha
       displayRequestDuration: true
       filter: true
     show-actuator: false


  mail:
    host: smtp.email.${OCI_REGION}.oci.oraclecloud.com
    port: 587
    username: ${OCI_SMTP_USERNAME}         # OCID del usuario SMTP de OCI
    password: ${OCI_SMTP_PASSWORD}         # Auth token generado en OCI
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        transport:
          protocol: smtp
    test-connection: false


server:
  port: ${SERVER_PORT:8080}

# ============================================
# Configuración de la aplicación
# ============================================
app:
  # Configuración CORS para desarrollo
  cors:
    allowed-origins:
      - "http://localhost:3000"
      - "http://localhost:5173"
      - "http://localhost:4321"
      - "http://localhost:8090"
    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
    exposed-headers:
      - "Authorization"
      - "X-Total-Count"
    allow-credentials: true
    max-age: 0 # Sin cache en desarrollo

  # Configuración JWT mejorada
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      access-token-expiration: 3600
      refresh-token-expiration: 86400
      confirmation-token-expiration: 172800
      issuer: "school-management-dev"

  # Configuración específica de la escuela
  school:
    name: "IPET 132"
    institutional-email-domain: "ipet132.edu.ar"
    default-student-role: "STUDENT"
    default-teacher-role: "TEACHER"

  # Logging para desarrollo
  logging:
    level:
      org.school.management: DEBUG
      org.springframework.security: DEBUG
      org.hibernate.SQL: DEBUG
      org.hibernate.type.descriptor.sql.BasicBinder: TRACE
      org.hibernate.orm.jdbc.bind: TRACE
    pattern:
      console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

  rate-limit:
    enabled: true
    login:
      capacity: 100
      refill-tokens: 100
      refill-seconds: 60
    activate-account:
      capacity: 100
      refill-tokens: 100
      refill-seconds: 60
    refresh-token:
      capacity: 100
      refill-tokens: 100
      refill-seconds: 60

  storage:
    oci:
      tenancy-ocid: ${OCI_TENANCY_OCID}
      user-ocid: ${OCI_USER_OCID}
      fingerprint: ${OCI_FINGERPRINT}
      private-key-path: ${OCI_PRIVATE_KEY_PATH}   # path al .pem en el servidor
      region: ${OCI_REGION}                        # ej: sa-saopaulo-1
      namespace: ${OCI_NAMESPACE}                  # visible en la consola OCI
      bucket-name: ${OCI_BUCKET_NAME}              # ej: ipet132-documents
      max-file-size-mb: 10

---
# ==============================
# Perfil PROD (despliegue en server / nube)
# ==============================
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&serverTimezone=UTC
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    # Configuración del pool de conexiones para producción
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 600000

  jpa:
    hibernate:
      ddl-auto: validate # En producción no modificamos el schema
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  mail:
    host: smtp.email.${OCI_REGION}.oci.oraclecloud.com
    port: 587
    username: ${OCI_SMTP_USERNAME}         # OCID del usuario SMTP de OCI
    password: ${OCI_SMTP_PASSWORD}         # Auth token generado en OCI
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        transport:
          protocol: smtp
    test-connection: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true # útil si la DB ya tiene datos


server:
  port: ${PORT:8080}
  # Configuración de seguridad para producción
  servlet:
    session:
      timeout: 30m
  compression:
    enabled: true
  http2:
    enabled: true

# ============================================
# Configuración CORS para PRODUCCIÓN
# ============================================
app:
  cors:
    allowed-origins:
      - "https://${FRONTEND_DOMAIN}"
      - "https://admin.${FRONTEND_DOMAIN}"

    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowed-headers:
      - "Content-Type"
      - "Authorization"
      - "Accept"
      - "Origin"
      - "X-Requested-With"
    exposed-headers:
      - "Authorization"
      - "X-Total-Count"
      - "Access-Control-Allow-Origin"
    allow-credentials: true
    max-age: 7200 # 2 horas de cache en producción

  # Configuración JWT para producción
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY} # DEBE ser variable de entorno
      access-token-expiration: 3600    # 1 hora
      refresh-token-expiration: 604800 # 7 días
      confirmation-token-expiration: 172800
      issuer: "school-management-prod"

  # Configuración específica de la escuela
  school:
    name: "IPET 132"
    institutional-email-domain: "ipet132.edu.ar"
    default-student-role: "STUDENT"
    default-teacher-role: "TEACHER"

  # Logging para producción
  logging:
    level:
      org.school.management: INFO
      org.springframework.security: WARN
      org.hibernate.SQL: WARN
    file:
      name: logs/school-management.log
    pattern:
      file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

  # Configuración de actuator para monitoreo
  management:
    endpoints:
      web:
        exposure:
          include: health,info,metrics
        base-path: /actuator
    endpoint:
      health:
        show-details: when-authorized
    info:
      build:
        enabled: true
      git:
        enabled: true

  rate-limit:
    enabled: true
    login:
      capacity: 5
      refill-tokens: 5
      refill-seconds: 60
    activate-account:
      capacity: 3
      refill-tokens: 3
      refill-seconds: 60
    refresh-token:
      capacity: 20
      refill-tokens: 20
      refill-seconds: 60

  storage:
    oci:
      tenancy-ocid: ${OCI_TENANCY_OCID}
      user-ocid: ${OCI_USER_OCID}
      fingerprint: ${OCI_FINGERPRINT}
      private-key-path: ${OCI_PRIVATE_KEY_PATH}   # path al .pem en el servidor
      region: ${OCI_REGION}                        # ej: sa-saopaulo-1
      namespace: ${OCI_NAMESPACE}                  # visible en la consola OCI
      bucket-name: ${OCI_BUCKET_NAME}              # ej: ipet132-documents
      max-file-size-mb: 10

---
# ==============================
# Perfil TEST (para testing)
# ==============================
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: ${DB_URL}
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  mail:
    host: localhost
    port: 1025 # Mailhog para testing

app:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      access-token-expiration: 3600
      refresh-token-expiration: 86400
      confirmation-token-expiration: 172800
      issuer: "school-management-test"

  cors:
    allowed-origins:
      - "*"
    allowed-methods:
      - "*"
    allowed-headers:
      - "*"
    allow-credentials: false
    max-age: 0

logging:
  level:
    org.school.management: WARN

rate-limit:
  enabled: false
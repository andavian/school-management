info:
  name: Registrar asistencia diaria del curso
  type: http
  seq: 1
  tags:
    - Attendance

http:
  method: POST
  url: "{{baseUrl}}/api/attendance/daily"
  body:
    type: json
    data: |-
      {
        "studentId": "",
        "gradeLevelId": "",
        "academicYearId": "",
        "attendanceDate": "",
        "status": "",
        "observations": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/attendance/daily"
      method: POST
      body:
        type: json
        data: |-
          {
            "studentId": "",
            "gradeLevelId": "",
            "academicYearId": "",
            "attendanceDate": "",
            "status": "",
            "observations": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "dailyAttendanceId": "",
            "studentId": "",
            "gradeLevelId": "",
            "academicYearId": "",
            "attendanceDate": "",
            "status": "",
            "justificationReason": "",
            "observations": "",
            "recordedByUserId": "",
            "createdAt": "",
            "updatedAt": ""
          }

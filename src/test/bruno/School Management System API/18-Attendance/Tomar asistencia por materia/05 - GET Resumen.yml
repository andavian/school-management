info:
  name: 05 - GET Resumen de Asistencia por Materia
  type: http
  seq: 5
  tags:
    - Attendance

http:
  method: GET
  url: "{{baseUrl}}/api/attendance/course/summary"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Resumen generado correctamente", function() {
            expect(res.status).to.equal(200);
            var body = res.getBody();
            expect(body).to.have.property("attendancePercentage");
            expect(body.weightedAbsences).to.be.above(0);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

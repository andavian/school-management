info:
  name: 01 - GET Periodo Actual
  type: http
  seq: 1
  tags:
    - Attendance
    - Prerequisites

http:
  method: GET
  url: "{{baseUrl}}/api/admin/academic-years/{{academic_year_id}}/periods/current"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 200) {
            var body = res.getBody();
            bru.setEnvVar("period_id", body.periodId, { persist: true });
            console.log("Periodo activo: " + body.periodId);
        }
    - type: tests
      code: |-
        test("Obtiene periodo activo", function() {
            expect(res.status).to.equal(200);
            expect(res.getBody()).to.have.property("periodId");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

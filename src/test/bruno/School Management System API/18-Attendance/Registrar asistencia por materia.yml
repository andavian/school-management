info:
  name: Registrar asistencia por materia
  type: http
  seq: 2
  tags:
    - Attendance

http:
  method: POST
  url: "{{baseUrl}}/api/attendance/course"
  body:
    type: json
    data: |-
      {
        "studentCourseSubjectId": "",
        "courseSubjectId": "",
        "periodId": "",
        "classDate": "",
        "status": "",
        "observations": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/attendance/course"
      method: POST
      body:
        type: json
        data: |-
          {
            "studentCourseSubjectId": "",
            "courseSubjectId": "",
            "periodId": "",
            "classDate": "",
            "status": "",
            "observations": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "courseAttendanceId": "",
            "studentCourseSubjectId": "",
            "courseSubjectId": "",
            "periodId": "",
            "classDate": "",
            "status": "",
            "absenceWeight": 0,
            "observations": "",
            "recordedByUserId": "",
            "createdAt": "",
            "updatedAt": ""
          }

info:
  name: Buscar provincias por nombre
  type: http
  seq: 4
  tags:
    - Geography

http:
  method: GET
  url: "{{baseUrl}}/api/geography/provinces/search"
  params:
    - name: q
      value: Córdoba
      type: query
      description: Texto de búsqueda
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/geography/provinces/search"
      method: GET
      params:
        - name: q
          value: Córdoba
          type: query
          description: Texto de búsqueda
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          [
            {
              "provinceId": "",
              "countryId": "",
              "countryName": "",
              "name": "",
              "code": "",
              "createdAt": ""
            }
          ]

docs: Permite buscar provincias por coincidencia parcial del nombre.

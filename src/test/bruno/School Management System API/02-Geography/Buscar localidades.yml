info:
  name: Buscar localidades
  type: http
  seq: 6
  tags:
    - Geography

http:
  method: GET
  url: "{{baseUrl}}/api/geography/places/search?q=córdoba&provinceId=3412a0ad-3809-11f1-ac89-cc4740a8b54c"
  params:
    - name: q
      value: córdoba
      type: query
      description: Texto de búsqueda
    - name: provinceId
      value: 3412a0ad-3809-11f1-ac89-cc4740a8b54c
      type: query
      description: ID opcional de provincia para filtrar
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/geography/places/search"
      method: GET
      params:
        - name: q
          value: Alta Gracia
          type: query
          description: Texto de búsqueda
        - name: provinceId
          value: uuid
          type: query
          description: ID opcional de provincia para filtrar
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          [
            {
              "placeId": "",
              "provinceId": "",
              "name": "",
              "type": "",
              "typeDisplayName": "",
              "postalCode": "",
              "createdAt": "",
              "provinceName": "",
              "provinceCode": "",
              "countryName": "",
              "countryIsoCode": "",
              "fullAddress": "",
              "fullDescription": ""
            }
          ]

docs: Permite buscar localidades por nombre, con filtro opcional por provincia.

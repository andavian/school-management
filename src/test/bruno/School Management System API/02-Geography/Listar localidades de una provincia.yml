info:
  name: Listar localidades de una provincia
  type: http
  seq: 3
  tags:
    - Geography

http:
  method: GET
  url: "{{baseUrl}}/api/geography/provinces/:provinceId/places"
  params:
    - name: provinceId
      value: uuid
      type: path
      description: ID de la provincia
    - name: type
      value: CIUDAD
      type: query
      description: Tipo opcional de localidad
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/geography/provinces/:provinceId/places"
      method: GET
      params:
        - name: provinceId
          value: uuid
          type: path
          description: ID de la provincia
        - name: type
          value: CIUDAD
          type: query
          description: Tipo opcional de localidad
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          [
            {
              "placeId": "",
              "name": "",
              "type": "",
              "postalCode": ""
            }
          ]

docs: Retorna todas las localidades pertenecientes a una provincia. Se puede filtrar por tipo.

info:
  name: Obtener localidad por ID
  type: http
  seq: 5
  tags:
    - Geography

http:
  method: GET
  url: "{{baseUrl}}/api/geography/places/:placeId"
  params:
    - name: placeId
      value: uuid
      type: path
      description: ID de la localidad
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/geography/places/:placeId"
      method: GET
      params:
        - name: placeId
          value: uuid
          type: path
          description: ID de la localidad
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "placeId": "",
            "provinceId": "",
            "name": "",
            "type": "",
            "typeDisplayName": "",
            "postalCode": "",
            "createdAt": "",
            "provinceName": "",
            "provinceCode": "",
            "countryName": "",
            "countryIsoCode": "",
            "fullAddress": "",
            "fullDescription": ""
          }

docs: Retorna la localidad y su jerarquía completa (provincia y país).

info:
  name: Búsqueda global
  type: http
  seq: 2
  tags:
    - Geography

http:
  method: GET
  url: "{{baseUrl}}/api/geography/search"
  params:
    - name: q
      value: ""
      type: query
      description: Texto de búsqueda general
    - name: limit
      value: "50"
      type: query
      description: Límite de resultados
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/geography/search"
      method: GET
      params:
        - name: q
          value: ""
          type: query
          description: Texto de búsqueda general
        - name: limit
          value: "50"
          type: query
          description: Límite de resultados
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          [
            {
              "placeId": "",
              "provinceId": "",
              "name": "",
              "type": "",
              "typeDisplayName": "",
              "postalCode": "",
              "createdAt": "",
              "provinceName": "",
              "provinceCode": "",
              "countryName": "",
              "countryIsoCode": "",
              "fullAddress": "",
              "fullDescription": ""
            }
          ]

docs: "Realiza una búsqueda en toda la jerarquía geográfica: países, provincias y localidades."

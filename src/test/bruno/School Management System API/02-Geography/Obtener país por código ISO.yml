info:
  name: Obtener país por código ISO
  type: http
  seq: 8
  tags:
    - Geography

http:
  method: GET
  url: "{{baseUrl}}/api/geography/countries/:isoCode"
  params:
    - name: isoCode
      value: ARG
      type: path
      description: Código ISO del país
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/geography/countries/:isoCode"
      method: GET
      params:
        - name: isoCode
          value: ARG
          type: path
          description: Código ISO del país
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "countryId": "",
            "name": "",
            "isoCode": "",
            "phoneCode": "",
            "createdAt": ""
          }

docs: Retorna la información del país correspondiente al código ISO proporcionado.

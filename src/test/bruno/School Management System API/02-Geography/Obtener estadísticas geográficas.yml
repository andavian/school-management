info:
  name: Obtener estadísticas geográficas
  type: http
  seq: 1
  tags:
    - Geography

http:
  method: GET
  url: "{{baseUrl}}/api/geography/statistics"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/geography/statistics"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "totalCountries": 0,
            "totalProvinces": 0,
            "totalPlaces": 0,
            "citiesCount": 0,
            "localitiesCount": 0
          }

docs: Solo para administradores. Retorna conteos y métricas generales del módulo de geografía.

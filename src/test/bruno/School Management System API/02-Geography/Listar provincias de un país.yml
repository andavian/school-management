http:
  method: GET
  url: "{{baseUrl}}/api/geography/countries/:countryId/provinces"
  params:
    - name: countryId
      value: 341107d0-3809-11f1-ac89-cc4740a8b54c
      type: path
      description: ID del país

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:

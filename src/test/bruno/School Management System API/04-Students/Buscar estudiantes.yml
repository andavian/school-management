info:
  name: Buscar estudiantes
  type: http
  seq: 1
  tags:
    - Students

http:
  method: GET
  url: "{{baseUrl}}/api/admin/students"
  params:
    - name: dni
      value: ""
      type: query
      description: DNI exacto (8 dígitos)
      disabled: true
    - name: fullName
      value: ""
      type: query
      description: Nombre o apellido (búsqueda parcial)
      disabled: true
    - name: residencePlaceId
      value: ""
      type: query
      description: UUID de la localidad de residencia
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/admin/students"
      method: GET
      params:
        - name: dni
          value: ""
          type: query
          description: DNI exacto (8 dígitos)
          disabled: true
        - name: fullName
          value: ""
          type: query
          description: Nombre o apellido (búsqueda parcial)
          disabled: true
        - name: residencePlaceId
          value: ""
          type: query
          description: UUID de la localidad de residencia
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "students": [
              {
                "studentId": "",
                "dni": "",
                "fullName": "",
                "age": 0,
                "email": "",
                "phone": ""
              }
            ],
            "total": 0
          }

docs: "Búsqueda con prioridad: dni > residencePlaceId > fullName > todos. Solo se usa el primer parámetro no nulo."

info:
  name: 01 - GET Año Lectivo Activo
  type: http
  seq: 1
  tags:
    - Students
    - Prerequisites

http:
  method: GET
  url: "{{baseUrl}}/api/admin/academic-years/current"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 200) {
            var body = res.getBody();
            bru.setEnvVar("academic_year_id", body.academicYearId, { persist: true });
            console.log("Año lectivo activo: " + body.year);
        }
    - type: tests
      code: |-
        test("Obtiene año lectivo activo", function() {
            expect(res.status).to.equal(200);
            expect(res.getBody()).to.have.property("academicYearId");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

info:
  name: Obtener estudiante por DNI
  type: http
  seq: 5
  tags:
    - Students

http:
  method: GET
  url: "{{baseUrl}}/api/admin/students/dni/:dni"
  params:
    - name: dni
      value: ""
      type: path
      description: DNI del estudiante (8 dígitos)
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5


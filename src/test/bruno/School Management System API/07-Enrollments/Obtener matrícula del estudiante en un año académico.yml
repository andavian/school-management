info:
  name: Obtener matrícula del estudiante en un año académico
  type: http
  seq: 3
  tags:
    - Enrollments

http:
  method: GET
  url: "{{baseUrl}}/api/admin/students/:studentId/enrollments/:academicYearId"
  params:
    - name: studentId
      value: ""
      type: path
    - name: academicYearId
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/admin/students/:studentId/enrollments/:academicYearId"
      method: GET
      params:
        - name: studentId
          value: ""
          type: path
        - name: academicYearId
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "enrollmentId": "",
            "studentId": "",
            "academicYearId": "",
            "gradeLevelId": "",
            "enrollmentDate": "",
            "enrollmentType": "",
            "status": "",
            "isRepeating": false,
            "previousSchool": "",
            "transferDate": "",
            "finalAverage": 0,
            "passed": false,
            "completionDate": "",
            "withdrawalDate": "",
            "withdrawalReasonId": "",
            "withdrawalObservations": "",
            "active": false,
            "canReceiveGrades": false,
            "durationInDays": 0,
            "createdAt": "",
            "updatedAt": ""
          }

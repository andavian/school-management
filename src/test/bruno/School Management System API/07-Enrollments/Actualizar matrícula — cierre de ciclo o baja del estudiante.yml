info:
  name: Actualizar matrícula — cierre de ciclo o baja del estudiante
  type: http
  seq: 1
  tags:
    - Enrollments

http:
  method: PATCH
  url: "{{baseUrl}}/api/admin/students/:studentId/enrollments/:enrollmentId"
  params:
    - name: studentId
      value: ""
      type: path
    - name: enrollmentId
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "finalAverage": 0,
        "passed": false,
        "withdrawalReasonId": "",
        "withdrawalObservations": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5


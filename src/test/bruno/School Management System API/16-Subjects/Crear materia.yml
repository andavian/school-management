info:
  name: Crear materia
  type: http
  seq: 4
  tags:
    - Subjects

http:
  method: POST
  url: "{{baseUrl}}/api/admin/subjects"
  body:
    type: json
    data: |-
      {
        "name": "",
        "code": "",
        "yearLevel": 0,
        "orientationId": "",
        "isMandatory": false,
        "weeklyHours": 0,
        "description": ""
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 201 Response
    description: Materia creada correctamente
    request:
      url: "{{baseUrl}}/api/admin/subjects"
      method: POST
      body:
        type: json
        data: |-
          {
            "name": "",
            "code": "",
            "yearLevel": 0,
            "orientationId": "",
            "isMandatory": false,
            "weeklyHours": 0,
            "description": ""
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "subjectId": "",
            "name": "",
            "code": "",
            "yearLevel": 0,
            "orientationId": "",
            "orientationName": "",
            "isCommonSubject": false,
            "weeklyHours": 0,
            "description": "",
            "isActive": false,
            "createdAt": "",

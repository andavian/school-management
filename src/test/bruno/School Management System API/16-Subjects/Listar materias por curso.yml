info:
  name: Listar materias por curso
  type: http
  seq: 5
  tags:
    - Subjects

http:
  method: GET
  url: "{{baseUrl}}/api/admin/subjects/grade-level/:gradeLevelId"
  params:
    - name: gradeLevelId
      value: grade-level-uuid
      type: path
      description: ID del curso (grade level)
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Materias obtenidas correctamente
    request:
      url: "{{baseUrl}}/api/admin/subjects/grade-level/:gradeLevelId"
      method: GET
      params:
        - name: gradeLevelId
          value: grade-level-uuid
          type: path
          description: ID del curso (grade level)
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          [
            {
              "subjectId": "",
              "name": "",
              "code": "",
              "yearLevel": 0,
              "orientationId": "",
              "orientationName": "",
              "isCommonSubject": false,
              "weeklyHours": 0,
              "description": "",
              "isActive": false,
              "createdAt": "",
              "updatedAt": ""
            }
          ]
  - name: 404 Response
    description: Curso no encontrado
    request:
      url: "{{baseUrl}}/api/admin/subjects/grade-level/:gradeLevelId"
      method: GET
      params:
        - name: gradeLevelId
          value: grade-level-uuid
          type: path
          description: ID del curso (grade level)
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          [
            {
              "subjectId": "",
              "name": "",
              "code": "",
              "yearLevel": 0,
              "orientationId": "",
              "orientationName": "",
              "isCommonSubject": false,
              "weeklyHours": 0,
              "description": "",
              "isActive": false,
              "createdAt": "",
              "updatedAt": ""
            }
          ]

docs: |
  Devuelve las materias correspondientes a un curso específico (grade level),
  combinando las materias comunes con las específicas de la orientación.

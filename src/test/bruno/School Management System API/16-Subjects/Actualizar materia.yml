info:
  name: Actualizar materia
  type: http
  seq: 2
  tags:
    - Subjects

http:
  method: PUT
  url: "{{baseUrl}}/api/admin/subjects/:id"
  params:
    - name: id
      value: subject-uuid
      type: path
      description: ID de la materia a actualizar
  body:
    type: json
    data: |-
      {
        "name": "",
        "weeklyHours": {
          "value": 0
        },
        "description": ""
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Materia actualizada correctamente
    request:
      url: "{{baseUrl}}/api/admin/subjects/:id"
      method: PUT
      params:
        - name: id
          value: subject-uuid
          type: path
          description: ID de la materia a actualizar
      body:
        type: json
        data: |-
          {
            "name": "",
            "weeklyHours": {
              "value": 0
            },
            "description": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "subjectId": "",
            "name": "",
            "code": "",
            "yearLevel": 0,
            "orientationId": "",
            "orientationName": "",
            "isCommonSubject": false,
            "weeklyHours": 0,
            "description": "",
            "isActive": false,
            "createdAt": "",
            "updatedAt": ""
          }
  - name: 400 Response
    description: Datos inválidos
    request:
      url: "{{baseUrl}}/api/admin/subjects/:id"
      method: PUT
      params:
        - name: id

info:
  name: 01 - GET Legajo Completo del Estudiante
  type: http
  seq: 1
  tags:
    - Student Records

http:
  method: GET
  url: "{{baseUrl}}/api/admin/students/{{current_student_id}}/record"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 200) {
          const body = res.getBody();
          console.log(`📋 Legajo cargado - Record ID: ${body.recordId || body.id}`);
          console.log(`Estado: ${body.status}`);
          console.log(`Cantidad de documentos: ${body.documents ? body.documents.length : 0}`);
        } else {
          console.error("❌ Error al obtener legajo:", res.getBody());
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

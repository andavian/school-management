info:
  name: 02 - POST Agregar Documento sin archivo
  type: http
  seq: 2
  tags:
    - Student Records

http:
  method: POST
  url: "{{baseUrl}}/api/admin/students/{{current_student_id}}/record/documents"
  body:
    type: json
    data: |-
      {
        "documentTypeId": "{{document_type_id}}",
        "title": "Certificado de VacunaciÃ³n 2025",
        "description": "Certificado completo de vacunas obligatorias",
        "issueDate": "2025-03-01",
        "issuingAuthority": "Ministerio de Salud"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 201) {
          console.log("âœ… Documento agregado al legajo correctamente");
        } else {
          console.error("âŒ Error al agregar documento:", res.getBody());
        }
    - type: tests
      code: |-
        test("Agregar un documento al legajo (sin archivo) responde 201", function() {
            expect(res.status).to.equal(201);
        });

        test("Agregar un documento al legajo (sin archivo) devuelve cuerpo valido", function() {
            if (res.status !== 204) {
                expect(res.getBody()).to.not.be.undefined;
            }
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5







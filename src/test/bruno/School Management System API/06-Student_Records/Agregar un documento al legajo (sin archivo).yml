info:
  name: 02 - POST Agregar Documento sin archivo
  type: http
  seq: 2
  tags:
    - Student Records

http:
  method: POST
  url: "{{base_url}}/api/admin/students/{{current_student_id}}/record/documents"
  body:
    type: json
    data: |-
      {
        "documentTypeId": "{{document_type_id}}",
        "title": "Certificado de Vacunación 2025",
        "description": "Certificado completo de vacunas obligatorias",
        "issueDate": "2025-03-01",
        "issuingAuthority": "Ministerio de Salud"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 201) {
          console.log("✅ Documento agregado al legajo correctamente");
        } else {
          console.error("❌ Error al agregar documento:", res.getBody());
        }
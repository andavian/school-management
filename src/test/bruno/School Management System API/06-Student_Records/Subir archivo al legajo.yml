info:
  name: 03 - POST Upload Documento con Archivo
  type: http
  seq: 3
  tags:
    - Student Records

http:
  method: POST
  url: "{{baseUrl}}/api/admin/students/{{current_student_id}}/record/{{record_id}}/upload"
  body:
    type: multipart-form
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 201) {
          console.log("âœ… Archivo subido y asociado al legajo correctamente");
        } else {
          console.error("âŒ Error al subir archivo:", res.getBody());
        }
    - type: tests
      code: |-
        test("Subir archivo al legajo responde 201", function() {
            expect(res.status).to.equal(201);
        });

        test("Subir archivo al legajo devuelve cuerpo valido", function() {
            if (res.status !== 204) {
                expect(res.getBody()).to.not.be.undefined;
            }
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5







info:
  name: 03 - POST Upload Documento con Archivo
  type: http
  seq: 3
  tags:
    - Student Records

http:
  method: POST
  url: "{{baseUrl}}/api/admin/students/{{current_student_id}}/record/{{record_id}}/upload"
  body:
    type: multipart-form
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 201) {
          console.log("✅ Archivo subido y asociado al legajo correctamente");
        } else {
          console.error("❌ Error al subir archivo:", res.getBody());
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

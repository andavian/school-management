info:
  name: Subir archivo al legajo
  type: http
  seq: 1
  tags:
    - Student_Records

http:
  method: POST
  url: "{{baseUrl}}/api/admin/students/:studentId/record/:recordId/upload"
  params:
    - name: studentId
      value: ""
      type: path
    - name: recordId
      value: ""
      type: path
  body:
    type: multipart-form
    data:
      - name: file
        type: file
        value: []
      - name: documentTypeId
        type: text
        value: ""
      - name: title
        type: text
        value: ""
      - name: description
        type: text
        value: ""
      - name: issueDate
        type: text
        value: ""
      - name: expiryDate
        type: text
        value: ""
      - name: issuingAuthority
        type: text
        value: ""
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/admin/students/:studentId/record/:recordId/upload"
      method: POST
      params:
        - name: studentId
          value: ""
          type: path
        - name: recordId
          value: ""
          type: path
      body:
        type: multipart-form
        data:
          - name: file
            type: file
            value: []
          - name: documentTypeId
            type: text
            value: ""
          - name: title
            type: text
            value: ""
          - name: description
            type: text
            value: ""
          - name: issueDate
            type: text
            value: ""
          - name: expiryDate
            type: text
            value: ""
          - name: issuingAuthority
            type: text
            value: ""
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "documentId": "",
            "recordId": "",
            "documentTypeId": "",
            "title": "",
            "description": "",
            "fileName": "",
            "mimeType": "",
            "fileSizeBytes": 0,
            "fileSizeMB": 0,
            "issueDate": "",
            "expiryDate": "",
            "issuingAuthority": "",
            "status": "PENDING",
            "reviewObservations": "",
            "approved": false,
            "rejected": false,
            "pending": false,
            "valid": false,
            "expired": false,
            "expiringSoon": false,
            "isImage": false,
            "isPdf": false,
            "uploadedBy": "",
            "uploadedAt": "",
            "updatedAt": ""
          }

docs: Sube un PDF o imagen (JPG/PNG, máx 10 MB) y lo asocia al legajo.

info:
  name: Aprobar o rechazar un documento del legajo
  type: http
  seq: 4
  tags:
    - Student_Records

http:
  method: PATCH
  url: "{{baseUrl}}/api/admin/students/:studentId/record/documents/:documentId"
  params:
    - name: studentId
      value: ""
      type: path
    - name: documentId
      value: ""
      type: path
    - name: action
      value: ""
      type: query
    - name: observations
      value: ""
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:

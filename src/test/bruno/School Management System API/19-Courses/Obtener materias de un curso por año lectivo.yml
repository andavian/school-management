info:
  name: Obtener materias de un curso por año lectivo
  type: http
  seq: 2
  tags:
    - Courses

http:
  method: GET
  url: "{{baseUrl}}/api/courses/course-subjects"
  params:
    - name: gradeLevelId
      value: ""
      type: query
    - name: academicYearId
      value: ""
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:

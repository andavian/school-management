info:
  name: Inscribir alumno a una materia-curso
  type: http
  seq: 1
  tags:
    - Courses

http:
  method: POST
  url: "{{baseUrl}}/api/courses/enrollments"
  body:
    type: json
    data: |-
      {
        "enrollmentId": "",
        "courseSubjectId": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/courses/enrollments"
      method: POST
      body:
        type: json
        data: |-
          {
            "enrollmentId": "",
            "courseSubjectId": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "studentCourseSubjectId": "",
            "enrollmentId": "",
            "courseSubjectId": "",
            "status": "ENROLLED",
            "totalClasses": 0,
            "createdAt": "",
            "updatedAt": ""
          }

    description: OK
    request:
      url: "{{baseUrl}}/api/courses/enrollments/:enrollmentId/courses"
      method: GET
      params:
        - name: enrollmentId
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          [
            {
              "studentCourseSubjectId": "",
              "enrollmentId": "",
              "courseSubjectId": "",
              "status": "ENROLLED",
              "totalClasses": 0,
              "createdAt": "",
              "updatedAt": ""
            }
          ]

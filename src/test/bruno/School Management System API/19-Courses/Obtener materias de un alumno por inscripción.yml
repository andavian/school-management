info:
  name: Obtener materias de un alumno por inscripción
  type: http
  seq: 5
  tags:
    - Courses

http:
  method: GET
  url: "{{baseUrl}}/api/courses/enrollments/:enrollmentId/courses"
  params:
    - name: enrollmentId
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:

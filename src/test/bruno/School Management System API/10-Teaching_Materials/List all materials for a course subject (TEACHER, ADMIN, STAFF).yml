info:
  name: List all materials for a course subject (TEACHER, ADMIN, STAFF)
  type: http
  seq: 5
  tags:
    - Teaching_Materials

http:
  method: GET
  url: "{{baseUrl}}/api/materials/course/:courseSubjectId"
  params:
    - name: courseSubjectId
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/materials/course/:courseSubjectId"
      method: GET
      params:
        - name: courseSubjectId
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "materials": [
              {
                "materialId": "",
                "teacherId": "",
                "courseSubjectId": "",
                "subjectId": "",
                "academicYearId": "",
                "title": "",
                "description": "",
                "materialType": "APUNTE",
                "publicUrl": "",
                "fileSizeBytes": 0,
                "mimeType": "",
                "visibleToStudents": false,
                "createdAt": "",
                "updatedAt": ""
              }
            ],
            "total": 0
          }

info:
  name: List visible materials for student's enrolled courses (STUDENT)
  type: http
  seq: 4
  tags:
    - Teaching_Materials

http:
  method: GET
  url: "{{baseUrl}}/api/materials/my-courses"
  params:
    - name: courseSubjectIds
      value: "[]"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/materials/my-courses"
      method: GET
      params:
        - name: courseSubjectIds
          value: "[]"
          type: query
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "materials": [
              {
                "materialId": "",
                "teacherId": "",
                "courseSubjectId": "",
                "subjectId": "",
                "academicYearId": "",
                "title": "",
                "description": "",
                "materialType": "APUNTE",
                "publicUrl": "",
                "fileSizeBytes": 0,
                "mimeType": "",
                "visibleToStudents": false,
                "createdAt": "",
                "updatedAt": ""
              }
            ],
            "total": 0
          }

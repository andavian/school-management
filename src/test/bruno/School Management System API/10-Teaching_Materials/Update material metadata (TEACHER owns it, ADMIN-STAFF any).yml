info:
  name: Update material metadata (TEACHER owns it, ADMIN/STAFF any)
  type: http
  seq: 3
  tags:
    - Teaching_Materials

http:
  method: PATCH
  url: "{{baseUrl}}/api/materials/:materialId"
  params:
    - name: materialId
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "title": "",
        "description": "",
        "materialType": "APUNTE",
        "visibleToStudents": false
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/materials/:materialId"
      method: PATCH
      params:
        - name: materialId
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "title": "",
            "description": "",
            "materialType": "APUNTE",
            "visibleToStudents": false
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "materialId": "",
            "teacherId": "",
            "courseSubjectId": "",
            "subjectId": "",
            "academicYearId": "",
            "title": "",
            "description": "",
            "materialType": "APUNTE",
            "publicUrl": "",
            "fileSizeBytes": 0,
            "mimeType": "",
            "visibleToStudents": false,
            "createdAt": "",
            "updatedAt": ""
          }

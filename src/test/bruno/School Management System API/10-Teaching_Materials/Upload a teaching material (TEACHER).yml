info:
  name: Upload a teaching material (TEACHER)
  type: http
  seq: 1
  tags:
    - Teaching_Materials

http:
  method: POST
  url: "{{baseUrl}}/api/materials"
  body:
    type: multipart-form
    data:
      - name: metadata
        type: text
        value: ""
      - name: file
        type: file
        value: []
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/materials"
      method: POST
      body:
        type: multipart-form
        data:
          - name: metadata
            type: text
            value: ""
          - name: file
            type: file
            value: []
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "materialId": "",
            "teacherId": "",
            "courseSubjectId": "",
            "subjectId": "",
            "academicYearId": "",
            "title": "",
            "description": "",
            "materialType": "APUNTE",
            "publicUrl": "",
            "fileSizeBytes": 0,
            "mimeType": "",
            "visibleToStudents": false,
            "createdAt": "",
            "updatedAt": ""
          }

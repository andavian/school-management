info:
  name: Upload a teaching material (TEACHER)
  type: http
  seq: 1
  tags:
    - Teaching_Materials

http:
  method: POST
  url: "{{baseUrl}}/api/materials"
  body:
    type: multipart-form
    data:
      - name: metadata
        type: text
        value: "{{upload_metadata}}"
      - name: file
        type: file
        value: []
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        // Pre-request Script - Preparar Multipart dinámico (avanzado)
        const fs = require('fs');
        const path = require('path');

        // Activa en bruno.json: "filesystemAccess": { "allow": true } y moduleWhitelist si usás form-data
        const filePath = path.resolve(bru.cwd(), "test-files/material-ejemplo.pdf");

        if (fs.existsSync(filePath)) {
          // Bruno maneja multipart en UI, pero puedes modificar req.body si es necesario
          console.log(`📁 Archivo listo: ${filePath}`);
        } else {
          console.error("❌ Archivo no encontrado");
        }

        // Metadata dinámico
        const metadata = {
          courseSubjectId: bru.getEnvVar("course_subject_id"),
          title: `Material de prueba - ${new Date().toISOString()}`,
          description: "Generado automáticamente por script Bruno",
          visibleToStudents: true
        };

        bru.setVar("upload_metadata", JSON.stringify(metadata));

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/materials"
      method: POST
      body:
        type: multipart-form
        data:
          - name: metadata
            type: text
            value: ""
          - name: file
            type: file
            value: []
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "materialId": "",
            "teacherId": "",
            "courseSubjectId": "",
            "subjectId": "",
            "academicYearId": "",
            "title": "",
            "description": "",
            "materialType": "APUNTE",
            "publicUrl": "",
            "fileSizeBytes": 0,
            "mimeType": "",
            "visibleToStudents": false,
            "createdAt": "",
            "updatedAt": ""
          }

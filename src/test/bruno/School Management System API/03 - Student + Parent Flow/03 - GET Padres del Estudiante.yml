info:
  name: 03 - GET Padres del Estudiante
  type: http
  seq: 3
  tags:
    - Students

http:
  method: GET
  url: "{{baseUrl}}/api/admin/students/{{current_student_id}}/parents"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 200) {
          const parents = res.getBody();
          console.log(`👨‍👩‍👧 Padres vinculados: ${parents.length}`);
        }
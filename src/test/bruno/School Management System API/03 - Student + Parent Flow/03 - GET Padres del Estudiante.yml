info:
  name: 03 - GET Padres del Estudiante
  type: http
  seq: 3
  tags:
    - Students

http:
  method: GET
  url: "{{baseUrl}}/api/admin/students/{{current_student_id}}/parents"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 200) {
          const parents = res.getBody();
          console.log(`ðŸ‘¨"ðŸ‘©"ðŸ‘§ Padres vinculados: ${parents.length}`);
        }
    - type: tests
      code: |-
        test("03 - GET Padres del Estudiante responde 200", function() {
            expect(res.status).to.equal(200);
        });

        test("03 - GET Padres del Estudiante devuelve lista", function() {
            const body = res.getBody();
            expect(body).to.be.an("array");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5



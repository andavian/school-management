info:
  name: 05 - POST Vincular Padre a Estudiante
  type: http
  seq: 5
  tags:
    - Parents

http:
  method: POST
  url: "{{baseUrl}}/api/admin/students/{{current_student_id}}/parents"
  body:
    type: json
    data: |-
      {
        "parentDni": "25917634",
        "relationship":"MOTHER"
        
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 201) {
          console.log("âœ… Padre vinculado correctamente al estudiante");
        } else {
          console.error("âŒ Error al vincular padre:", res.getBody());
        }
    - type: tests
      code: |-
        test("05 - POST Vincular Padre a Estudiante responde 201", function() {
            expect(res.status).to.equal(201);
        });

        test("05 - POST Vincular Padre a Estudiante devuelve cuerpo valido", function() {
            if (res.status !== 204) {
                expect(res.getBody()).to.not.be.undefined;
            }
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5







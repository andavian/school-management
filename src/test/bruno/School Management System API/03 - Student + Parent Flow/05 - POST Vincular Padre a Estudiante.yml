info:
  name: 05 - POST Vincular Padre a Estudiante
  type: http
  seq: 5
  tags:
    - Parents

http:
  method: POST
  url: "{{baseUrl}}/api/admin/students/{{current_student_id}}/parents"
  body:
    type: json
    data: |-
      {
        "parentDni": "98765432"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 201) {
          console.log("✅ Padre vinculado correctamente al estudiante");
        } else {
          console.error("❌ Error al vincular padre:", res.getBody());
        }
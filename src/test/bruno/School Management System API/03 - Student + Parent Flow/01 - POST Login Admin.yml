info:
  name: 01 - POST Login Admin
  type: http
  seq: 1
  tags:
    - Authentication

http:
  method: POST
  url: "{{baseUrl}}/api/auth/login"
  body:
    type: json
    data: |-
      {
        "dni": "{{admin_dni}}",
        "password": "{{admin_password}}",
        "rememberMe": false
      }

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 200 || res.status === 201) {
          const body = res.getBody();
          const token = body.token || body.accessToken || body.data?.token;

          if (token) {
            bru.setEnvVar("jwt_token", token, { persist: true });
            console.log("âœ… Token ADMIN guardado correctamente");
          } else {
            console.error("⚠️ No se encontró token en la respuesta");
          }
        } else {
          console.error(`❌ Login falló con status ${res.status}`);
        }
    - type: tests
      code: |-
        test("01 - POST Login Admin responde 200", function() {
            expect(res.status).to.equal(200);
        });

        test("01 - POST Login Admin devuelve cuerpo valido", function() {
            if (res.status !== 204) {
                expect(res.getBody()).to.not.be.undefined;
            }
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5








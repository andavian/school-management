info:
  name: 02 - GET Estudiante por DNI (Lucas)
  type: http
  seq: 2
  tags:
    - Students

http:
  method: GET
  url: "{{baseUrl}}/api/admin/students/dni/60123456"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 200) {
          const body = res.getBody();
          bru.setEnvVar("current_student_id", body.id || body.studentId);
          console.log(`✅ Estudiante Lucas Romero encontrado - ID: ${bru.getEnvVar("current_student_id")}`);
        } else {
          console.error("❌ Error al obtener estudiante");
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

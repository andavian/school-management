info:
  name: Actualizar orientación
  type: http
  seq: 2
  tags:
    - Orientations

http:
  method: PUT
  url: "{{baseUrl}}/api/admin/orientations/:id"
  params:
    - name: id
      value: ""
      type: path
      description: ID de la orientación a actualizar
  body:
    type: json
    data: |-
      {
        "name": "",
        "description": "",
        "availableFromYear": {
          "value": 0,
          "displayName": "",
          "basicCycle": false,
          "orientedCycle": false
        }
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5


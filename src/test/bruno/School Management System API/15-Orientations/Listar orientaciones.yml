info:
  name: Listar orientaciones
  type: http
  seq: 4
  tags:
    - Orientations

http:
  method: GET
  url: "{{baseUrl}}/api/admin/orientations"
  params:
    - name: activeOnly
      value: "true"
      type: query
      description: Filtrar solo orientaciones activas
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Orientaciones obtenidas correctamente
    request:
      url: "{{baseUrl}}/api/admin/orientations"
      method: GET
      params:
        - name: activeOnly
          value: "true"
          type: query
          description: Filtrar solo orientaciones activas
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          [
            {
              "orientationId": {
                "value": ""
              },
              "name": "",
              "code": {
                "value": ""
              },
              "description": "",
              "availableFromYear": {
                "value": 0
              },
              "isActive": false,
              "createdAt": "",
              "updatedAt": ""
            }
          ]

docs: |
  Devuelve todas las orientaciones disponibles.
  Puede filtrarse por estado activo mediante `activeOnly`.

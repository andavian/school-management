info:
  name: Obtener orientación
  type: http
  seq: 1
  tags:
    - Orientations

http:
  method: GET
  url: "{{baseUrl}}/api/admin/orientations/:id"
  params:
    - name: id
      value: orientation-uuid
      type: path
      description: ID de la orientación
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Orientación encontrada
    request:
      url: "{{baseUrl}}/api/admin/orientations/:id"
      method: GET
      params:
        - name: id
          value: orientation-uuid
          type: path
          description: ID de la orientación
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "orientationId": {
              "value": ""
            },
            "name": "",
            "code": {
              "value": ""
            },
            "description": "",
            "availableFromYear": {
              "value": 0
            },
            "isActive": false,
            "createdAt": "",
            "updatedAt": ""
          }
  - name: 404 Response
    description: Orientación no encontrada
    request:
      url: "{{baseUrl}}/api/admin/orientations/:id"
      method: GET
      params:
        - name: id
          value: orientation-uuid
          type: path
          description: ID de la orientación
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "orientationId": {
              "value": ""
            },
            "name": "",
            "code": {
              "value": ""
            },
            "description": "",
            "availableFromYear": {
              "value": 0
            },
            "isActive": false,
            "createdAt": "",
            "updatedAt": ""
          }

docs: Devuelve una orientación por su ID.

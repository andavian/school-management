runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 201) {
            var body = res.getBody();
            bru.setEnvVar("new_student_id", body.studentId, { persist: true });
            console.log("Estudiante creado: " + body.fullName + " ID=" + body.studentId);
        }
    - type: tests
      code: |-
        test("Creación retorna 201 y datos completos", function() {
            expect(res.status).to.equal(201);
            var body = res.getBody();
            expect(body).to.have.property("studentId");
            expect(body.firstName).to.equal("Valentina");
            expect(body.lastName).to.equal("Moreno");
            expect(body.dni).to.equal("99887766");
        });

        test("Ficha médica creada automáticamente", function() {
            var body = res.getBody();
            // El spec devuelve healthRecord dentro del estudiante? Según los specs, StudentWebResponse no incluye healthRecord directamente, 
            // pero sí hay un endpoint separado. Sin embargo, en la respuesta del POST, algunos backends devuelven el healthRecord.
            // Si tu backend lo incluye, descomenta:
            // expect(body).to.have.property("healthRecord");
            // Si no, este test puede omitirse o consultar el endpoint GET /api/admin/students/{id}/health
        });

        test("Tiene enrollment activa", function() {
            var body = res.getBody();
            // Similar, la respuesta puede incluir enrollment o no. Si no, luego se verifica con GET.
            // expect(body.enrollment).to.not.be.null;
        });


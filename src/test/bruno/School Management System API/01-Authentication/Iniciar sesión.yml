info:
  name: Iniciar sesiÃ³n
  type: http
  seq: 3
  tags:
    - Authentication

http:
  method: POST
  url: "{{baseUrl}}/api/auth/login"
  headers:
    - name: X-Forwarded-For
      value: ""
      disabled: true
    - name: User-Agent
      value: ""
      disabled: true
  body:
    type: json
    data: |-
      {
        "dni": "{{admin_dni}}",
        "password": "{{admin_password}}",
        "rememberMe": false
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        // ================================================
        // POST-RESPONSE SCRIPT - LOGIN + REFRESH TOKEN
        // School Management API - Bruno
        // ================================================

        if (res.status === 200 || res.status === 201) {
            const body = res.getBody();

            // Ajusta segÃºn la estructura real de tu respuesta de login
            const accessToken = body.token || body.accessToken || body.jwt || body.data?.token;
            const refreshToken = body.refreshToken || body.refresh_token || body.data?.refreshToken;

            if (accessToken) {
                // Guardar token principal (usado en toda la colecciÃ³n)
                bru.setEnvVar("jwt_token", accessToken, { persist: true });
                console.log("âœ… Access Token guardado correctamente");

                // Guardar refresh token si existe
                if (refreshToken) {
                    bru.setEnvVar("refresh_token", refreshToken, { persist: true });
                    console.log("ðŸ”„ Refresh Token guardado");
                }

                // Opcional: Guardar informaciÃ³n del usuario
                if (body.user || body.data?.user) {
                    const user = body.user || body.data.user;
                    bru.setEnvVar("current_user_id", user.id || user.userId);
                    bru.setEnvVar("current_role", user.role || "UNKNOWN");
                }

                // Mostrar resumen en consola
                console.log(`ðŸ” SesiÃ³n iniciada - Rol: ${bru.getEnvVar("current_role") || "N/A"}`);
            } 
            else {
                console.error("âš ï¸ No se encontrÃ³ access token en la respuesta de login");
            }
        } 
        else {
            console.error(`âŒ Login fallÃ³ con cÃ³digo ${res.status}`);
            console.error("Respuesta:", res.getBody());
        }

        // ================================================
        // LÃ“GICA DE REFRESH AUTOMÃTICO (simulada por ahora)
        // ================================================

        // FunciÃ³n reutilizable para refrescar token
        bru.refreshToken = async function() {
            console.log("ðŸ”„ Intentando refrescar token...");

            // Mientras el endpoint real no exista, simulamos con un nuevo login
            // (puedes cambiar esto cuando implementes /refresh-token)

            const dni = bru.getEnvVar("test_dni") || "12345678";           // ponÃ© tu DNI de prueba
            const password = bru.getEnvVar("test_password") || "TuPassword123";

            // Crear request de refresh simulada
            const refreshRequest = {
                method: "POST",
                url: "{{baseUrl}}/api/auth/login",
                header: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    dni: dni,
                    password: password
                })
            };

            try {
                const refreshRes = await bru.sendRequest(refreshRequest);
                
                if (refreshRes.status === 200) {
                    const newBody = refreshRes.getBody();
                    const newToken = newBody.token || newBody.accessToken;

                    if (newToken) {
                        bru.setEnvVar("jwt_token", newToken, { persist: true });
                        console.log("âœ… Token refrescado exitosamente (simulado con login)");
                        return true;
                    }
                }
                
                console.error("âŒ FallÃ³ el refresh del token");
                return false;
            } catch (error) {
                console.error("Error en refresh:", error);
                return false;
            }
        };
    - type: tests
      code: |-
        test("Iniciar sesión responde 200", function() {
            expect(res.status).to.equal(200);
        });

        test("Iniciar sesión devuelve cuerpo valido", function() {
            if (res.status !== 204) {
                expect(res.getBody()).to.not.be.undefined;
            }
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5


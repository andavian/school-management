info:
  name: Iniciar sesión
  type: http
  seq: 3
  tags:
    - Authentication

http:
  method: POST
  url: "{{baseUrl}}/api/auth/login"
  headers:
    - name: X-Forwarded-For
      value: ""
      disabled: true
    - name: User-Agent
      value: ""
      disabled: true
  body:
    type: json
    data: |-
      {
        "dni": "",
        "password": "",
        "rememberMe": false
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        // ================================================
        // POST-RESPONSE SCRIPT - LOGIN + REFRESH TOKEN
        // School Management API - Bruno
        // ================================================

        if (res.status === 200 || res.status === 201) {
            const body = res.getBody();

            // Ajusta según la estructura real de tu respuesta de login
            const accessToken = body.token || body.accessToken || body.jwt || body.data?.token;
            const refreshToken = body.refreshToken || body.refresh_token || body.data?.refreshToken;

            if (accessToken) {
                // Guardar token principal (usado en toda la colección)
                bru.setEnvVar("jwt_token", accessToken, { persist: true });
                console.log("✅ Access Token guardado correctamente");

                // Guardar refresh token si existe
                if (refreshToken) {
                    bru.setEnvVar("refresh_token", refreshToken, { persist: true });
                    console.log("🔄 Refresh Token guardado");
                }

                // Opcional: Guardar información del usuario
                if (body.user || body.data?.user) {
                    const user = body.user || body.data.user;
                    bru.setEnvVar("current_user_id", user.id || user.userId);
                    bru.setEnvVar("current_role", user.role || "UNKNOWN");
                }

                // Mostrar resumen en consola
                console.log(`🔐 Sesión iniciada - Rol: ${bru.getEnvVar("current_role") || "N/A"}`);
            } 
            else {
                console.error("⚠️ No se encontró access token en la respuesta de login");
            }
        } 
        else {
            console.error(`❌ Login falló con código ${res.status}`);
            console.error("Respuesta:", res.getBody());
        }

        // ================================================
        // LÓGICA DE REFRESH AUTOMÁTICO (simulada por ahora)
        // ================================================

        // Función reutilizable para refrescar token
        bru.refreshToken = async function() {
            console.log("🔄 Intentando refrescar token...");

            // Mientras el endpoint real no exista, simulamos con un nuevo login
            // (puedes cambiar esto cuando implementes /refresh-token)

            const dni = bru.getEnvVar("test_dni") || "12345678";           // poné tu DNI de prueba
            const password = bru.getEnvVar("test_password") || "TuPassword123";

            // Crear request de refresh simulada
            const refreshRequest = {
                method: "POST",
                url: "{{base_url}}/api/auth/login",
                header: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    dni: dni,
                    password: password
                })
            };

            try {
                const refreshRes = await bru.sendRequest(refreshRequest);
                
                if (refreshRes.status === 200) {
                    const newBody = refreshRes.getBody();
                    const newToken = newBody.token || newBody.accessToken;

                    if (newToken) {
                        bru.setEnvVar("jwt_token", newToken, { persist: true });
                        console.log("✅ Token refrescado exitosamente (simulado con login)");
                        return true;
                    }
                }
                
                console.error("❌ Falló el refresh del token");
                return false;
            } catch (error) {
                console.error("Error en refresh:", error);
                return false;
            }
        };

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Login exitoso
    request:
      url: "{{baseUrl}}/api/auth/login"
      method: POST
      body:
        type: json
        data: |-
          {
            "dni": "",
            "password": "",
            "rememberMe": false
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "accessToken": "",
            "refreshToken": "",
            "tokenType": "",
            "expiresIn": 0,
            "user": {
              "userId": "",
              "dni": "",
              "roles": [],
              "isActive": false,
              "createdAt": "",
              "lastLoginAt": "",
              "updatedAt": ""
            }
          }
  - name: 400 Response
    description: Credenciales inválidas
    request:
      url: "{{baseUrl}}/api/auth/login"
      method: POST
      body:
        type: json
        data: |-
          {
            "dni": "",
            "password": "",
            "rememberMe": false
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "success": false,
            "message": "",
            "errorCode": "",
            "timestamp": "",
            "path": "",
            "fieldErrors": [
              {
                "field": "",
                "rejectedValue": {},
                "message": ""
              }
            ]
          }
  - name: 403 Response
    description: Usuario inactivo
    request:
      url: "{{baseUrl}}/api/auth/login"
      method: POST
      body:
        type: json
        data: |-
          {
            "dni": "",
            "password": "",
            "rememberMe": false
          }
    response:
      status: 403
      statusText: Forbidden
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "success": false,
            "message": "",
            "errorCode": "",
            "timestamp": "",
            "path": "",
            "fieldErrors": [
              {
                "field": "",
                "rejectedValue": {},
                "message": ""
              }
            ]
          }

docs: Autentica un usuario por DNI y contraseña. Devuelve JWT si las credenciales son válidas.

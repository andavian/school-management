info:
  name: Obtener perfil propio
  type: http
  seq: 5
  tags:
    - Authentication

http:
  method: GET
  url: "{{baseUrl}}/api/auth/profile"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Perfil del usuario
    request:
      url: "{{baseUrl}}/api/auth/profile"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "userId": "",
            "dni": "",
            "roles": [],
            "isActive": false,
            "createdAt": "",
            "lastLoginAt": "",
            "updatedAt": ""
          }
  - name: 401 Response
    description: Usuario no autenticado
    request:
      url: "{{baseUrl}}/api/auth/profile"
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "userId": "",
            "dni": "",
            "roles": [],
            "isActive": false,
            "createdAt": "",
            "lastLoginAt": "",
            "updatedAt": ""
          }

docs: Devuelve la información del usuario autenticado.

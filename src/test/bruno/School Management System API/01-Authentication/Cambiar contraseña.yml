info:
  name: Cambiar contraseña
  type: http
  seq: 1
  tags:
    - Authentication

http:
  method: PUT
  url: "{{baseUrl}}/api/auth/change-password"
  body:
    type: json
    data: |-
      {
        "currentPassword": "",
        "newPassword": ""
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Contraseña cambiada exitosamente
    request:
      url: "{{baseUrl}}/api/auth/change-password"
      method: PUT
      body:
        type: json
        data: |-
          {
            "currentPassword": "",
            "newPassword": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "success": false,
            "message": "",
            "timestamp": ""
          }
  - name: 400 Response
    description: Contraseña actual incorrecta
    request:
      url: "{{baseUrl}}/api/auth/change-password"
      method: PUT
      body:
        type: json
        data: |-
          {
            "currentPassword": "",
            "newPassword": ""
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "success": false,
            "message": "",
            "errorCode": "",
            "timestamp": "",
            "path": "",
            "fieldErrors": [
              {
                "field": "",
                "rejectedValue": {},
                "message": ""
              }
            ]
          }
  - name: 401 Response
    description: Usuario no autenticado
    request:
      url: "{{baseUrl}}/api/auth/change-password"
      method: PUT
      body:
        type: json
        data: |-
          {
            "currentPassword": "",
            "newPassword": ""
          }
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "success": false,
            "message": "",
            "timestamp": ""
          }

docs: Permite al usuario autenticado cambiar su contraseña actual.

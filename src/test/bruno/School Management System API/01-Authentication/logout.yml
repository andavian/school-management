info:
  name: logout
  type: http
  seq: 3
  tags:
    - Authentication

http:
  method: POST
  url: "{{baseUrl}}/api/auth/logout"
  body:
    type: json
    data: |-
      {
        "refreshToken": "{{refresh_token}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/auth/logout"
      method: POST
      body:
        type: json
        data: |-
          {
            "refreshToken": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "success": false,
            "message": "",
            "timestamp": ""
          }

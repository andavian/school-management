info:
  name: 03 - GET Profile con token renovado
  type: http
  seq: 3
  tags:
    - Authentication

http:
  method: GET
  url: "{{baseUrl}}/api/auth/profile"
  auth:
    type: bearer
    token: "{{jwt_token}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("Perfil accesible con token renovado", function() {
            expect(res.status).to.equal(200);
            expect(res.getBody()).to.have.property("userId");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5







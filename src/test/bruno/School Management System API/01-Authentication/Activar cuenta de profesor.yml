info:
  name: Activar cuenta de profesor
  type: http
  seq: 4
  tags:
    - Authentication

http:
  method: POST
  url: "{{baseUrl}}/api/auth/activate-account"
  body:
    type: json
    data: |-
      {
        "token": "",
        "newPassword": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Cuenta activada correctamente
    request:
      url: "{{baseUrl}}/api/auth/activate-account"
      method: POST
      body:
        type: json
        data: |-
          {
            "token": "",
            "newPassword": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "success": false,
            "message": "",
            "timestamp": ""
          }
  - name: 400 Response
    description: Token inválido o expirado
    request:
      url: "{{baseUrl}}/api/auth/activate-account"
      method: POST
      body:
        type: json
        data: |-
          {
            "token": "",
            "newPassword": ""
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "success": false,
            "message": "",
            "errorCode": "",
            "timestamp": "",
            "path": "",
            "fieldErrors": [
              {
                "field": "",
                "rejectedValue": {},
                "message": ""
              }
            ]
          }

docs: Activa la cuenta de un profesor usando el token enviado por email.

info:
  name: 04 - PATCH Actualizar Estudiante
  type: http
  seq: 4
  tags:
    - Students

http:
  method: PATCH
  url: "{{baseUrl}}/api/admin/students/{{new_created_student_id}}"
  body:
    type: json
    data: |-
      {
      "firstName": "Ian Germán",
      "lastName":"Elbaum",
      "phone": "3515999888",
      "email": "iangermanelbaum@gmail.com",
      "addressStreet":"Dieciocho",
      "addressNumber": "550",
      "residencePlaceId": "{{cordoba_place_id}}"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 200) {
          console.log("✅ Estudiante actualizado correctamente");
          console.log("Nuevo nombre:", res.getBody().firstName);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

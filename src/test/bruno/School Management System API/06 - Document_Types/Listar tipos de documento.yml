info:
  name: Listar tipos de documento
  type: http
  seq: 1
  tags:
    - Document_Types

http:
  method: GET
  url: "{{baseUrl}}/api/admin/document-types"
  params:
    - name: onlyActive
      value: "true"
      type: query
    - name: category
      value: PERSONAL
      type: query
      disabled: true
    - name: category
      value: ACADEMIC
      type: query
      disabled: true
    - name: category
      value: MEDICAL
      type: query
      disabled: true
    - name: category
      value: LEGAL
      type: query
      disabled: true
    - name: onlyMandatory
      value: ""
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/admin/document-types"
      method: GET
      params:
        - name: onlyActive
          value: "true"
          type: query
        - name: category
          value: PERSONAL
          type: query
          disabled: true
        - name: category
          value: ACADEMIC
          type: query
          disabled: true
        - name: category
          value: MEDICAL
          type: query
          disabled: true
        - name: category
          value: LEGAL
          type: query
          disabled: true
        - name: onlyMandatory
          value: ""
          type: query
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          [
            {
              "documentTypeId": "",
              "name": "",
              "code": "",
              "category": "PERSONAL",
              "mandatory": false,
              "description": "",
              "validForYears": 0,
              "permanent": false,
              "active": false
            }
          ]

docs: "Soporta filtros: onlyActive (default true), category, onlyMandatory"

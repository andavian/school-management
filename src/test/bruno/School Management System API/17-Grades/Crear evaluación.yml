info:
  name: Crear evaluación
  type: http
  seq: 4
  tags:
    - Grades

http:
  method: POST
  url: "{{baseUrl}}/api/grades/evaluations"
  body:
    type: json
    data: |-
      {
        "studentCourseSubjectId": "",
        "periodId": "",
        "evaluationTypeId": "",
        "title": "",
        "description": "",
        "evaluationDate": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/grades/evaluations"
      method: POST
      body:
        type: json
        data: |-
          {
            "studentCourseSubjectId": "",
            "periodId": "",
            "evaluationTypeId": "",
            "title": "",
            "description": "",
            "evaluationDate": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "evaluationId": "",
            "studentCourseSubjectId": "",
            "periodId": "",
            "evaluationTypeId": "",
            "title": "",
            "description": "",
            "evaluationDate": "",
            "grade": 0,
            "maxGrade": 0,
            "status": "PENDING",
            "isValidated": false,
            "validatedBy": "",
            "validatedAt": "",
            "teacherObservations": "",
            "adminNotes": "",
            "isPassed": false,
            "createdAt": "",
            "updatedAt": ""
          }

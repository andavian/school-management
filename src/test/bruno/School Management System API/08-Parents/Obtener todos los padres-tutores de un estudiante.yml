info:
  name: Obtener todos los padres/tutores de un estudiante
  type: http
  seq: 1
  tags:
    - Parents

http:
  method: GET
  url: "{{baseUrl}}/api/admin/students/:studentId/parents"
  params:
    - name: studentId
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:

info:
  name: Crear un nuevo padre/tutor en el sistema
  type: http
  seq: 3
  tags:
    - Parents

http:
  method: POST
  url: "{{baseUrl}}/api/admin/parents"
  body:
    type: json
    data: |-
      {
        "firstName": "",
        "lastName": "",
        "dni": "",
        "cuil": "",
        "birthDate": "",
        "gender": "",
        "nationality": "",
        "email": "",
        "phone": "",
        "phoneAlt": "",
        "addressStreet": "",
        "addressNumber": "",
        "addressFloor": "",
        "addressApartment": "",
        "placeId": "",
        "postalCode": "",
        "occupation": "",
        "workplace": "",
        "workplacePhone": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5


info:
  name: Obtener ficha médica por ID de estudiante
  type: http
  seq: 1
  tags:
    - Student_Health_Records

http:
  method: GET
  url: "{{baseUrl}}/api/admin/students/:studentId/health"
  params:
    - name: studentId
      value: ""
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/admin/students/:studentId/health"
      method: GET
      params:
        - name: studentId
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "healthRecordId": "",
            "studentId": "",
            "bloodType": "",
            "healthInsurance": "",
            "healthInsuranceNumber": "",
            "allergies": "",
            "chronicConditions": "",
            "medications": "",
            "medicalObservations": "",
            "emergencyContactFirstName": "",
            "emergencyContactLastName": "",
            "emergencyContactFullName": "",
            "emergencyContactPhone": "",
            "hasCompleteHealthInfo": false,
            "hasAllergies": false,
            "hasChronicConditions": false,

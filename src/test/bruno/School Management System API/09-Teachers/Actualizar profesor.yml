info:
  name: Actualizar profesor
  type: http
  seq: 4
  tags:
    - Teachers

http:
  method: PATCH
  url: "{{baseUrl}}/api/admin/teachers/:teacherId"
  params:
    - name: teacherId
      value: ""
      type: path
      description: UUID del profesor
  body:
    type: json
    data: |-
      {
        "firstName": "",
        "lastName": "",
        "birthDate": "",
        "birthPlaceId": "",
        "gender": "",
        "nationality": "",
        "phone": "",
        "email": "",
        "address": {
          "street": "",
          "number": "",
          "floor": "",
          "apartment": "",
          "placeId": "",
          "postalCode": ""
        },
        "specialization": "",
        "teachingLicense": "",
        "employmentType": "FULL_TIME",
        "employmentStatus": "ACTIVE"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5


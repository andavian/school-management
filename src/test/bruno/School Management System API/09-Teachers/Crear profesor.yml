info:
  name: Crear profesor
  type: http
  seq: 2
  tags:
    - Teachers

http:
  method: POST
  url: "{{baseUrl}}/api/admin/teachers"
  body:
    type: json
    data: |-
      {
        "firstName": "",
        "lastName": "",
        "dni": "",
        "cuil": "",
        "email": "",
        "birthDate": "",
        "birthPlaceId": "",
        "gender": "",
        "nationality": "",
        "phone": "",
        "address": {
          "street": "",
          "number": "",
          "floor": "",
          "apartment": "",
          "placeId": "",
          "postalCode": ""
        },
        "specialization": "",
        "teachingLicense": "",
        "hireDate": "",
        "employmentType": "FULL_TIME"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5


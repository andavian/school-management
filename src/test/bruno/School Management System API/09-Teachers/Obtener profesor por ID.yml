info:
  name: Obtener profesor por ID
  type: http
  seq: 3
  tags:
    - Teachers

http:
  method: GET
  url: "{{baseUrl}}/api/admin/teachers/:teacherId"
  params:
    - name: teacherId
      value: ""
      type: path
      description: UUID del profesor
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:

info:
  name: Buscar profesores
  type: http
  seq: 1
  tags:
    - Teachers

http:
  method: GET
  url: "{{baseUrl}}/api/admin/teachers"
  params:
    - name: dni
      value: ""
      type: query
      description: DNI exacto (8 dígitos)
      disabled: true
    - name: lastName
      value: ""
      type: query
      description: Apellido (búsqueda parcial)
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/admin/teachers"
      method: GET
      params:
        - name: dni
          value: ""
          type: query
          description: DNI exacto (8 dígitos)
          disabled: true
        - name: lastName
          value: ""
          type: query
          description: Apellido (búsqueda parcial)
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "teachers": [
              {
                "teacherId": "",
                "firstName": "",
                "lastName": "",
                "fullName": "",
                "dni": "",
                "email": "",
                "phone": "",
                "specialization": "",
                "employmentStatus": "ACTIVE",
                "employmentType": "FULL_TIME",
                "active": false
              }
            ],
            "total": 0
          }

docs: Búsqueda por DNI exacto o apellido parcial. Sin parámetros retorna todos los profesores activos.

info:
  name: 04 - GET Periodo Actual
  type: http
  seq: 4
  tags:
    - Evaluation_Periods

http:
  method: GET
  url: "{{baseUrl}}/api/admin/academic-years/{{academic_year_id}}/periods/current"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 200) {
            const body = res.getBody();
            bru.setEnvVar("period_id", body.periodId, { persist: true });
            bru.setEnvVar("evaluation_period_id", body.periodId, { persist: true });
        }
    - type: tests
      code: |-
        test("Obtiene periodo actual", function() {
            expect(res.status).to.equal(200);
            const body = res.getBody();
            expect(body).to.have.property("periodId");
            expect(body.academicYearId).to.equal(bru.getEnvVar("academic_year_id"));
            expect(body).to.have.property("status");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5







info:
  name: 06 - PATCH Activar Periodo
  type: http
  seq: 6
  tags:
    - Evaluation_Periods

http:
  method: PATCH
  url: "{{baseUrl}}/api/admin/periods/{{period_id}}/activate"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Activa periodo de evaluacion", function() {
            expect(res.status).to.equal(200);
            const body = res.getBody();
            expect(body.periodId).to.equal(bru.getEnvVar("period_id"));
            expect(body.status).to.equal("ACTIVE");
            expect(body).to.have.property("isInProgress");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5







info:
  name: Desactivar curso
  type: http
  seq: 5
  tags:
    - Grade_Levels

http:
  method: DELETE
  url: "{{baseUrl}}/api/admin/grade-levels/:id"
  params:
    - name: id
      value: ""
      type: path
      description: ID del curso
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Curso desactivado correctamente
    request:
      url: "{{baseUrl}}/api/admin/grade-levels/:id"
      method: DELETE
      params:
        - name: id
          value: ""
          type: path
          description: ID del curso
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "gradeLevelId": "",
            "academicYearId": "",
            "yearLevel": 0,
            "division": "",
            "displayName": "",
            "orientationId": "",
            "orientationName": "",
            "fullDisplayName": "",
            "shift": "",
            "maxStudents": 0,
            "homeroomTeacherId": "",
            "isActive": false,
            "createdAt": "",
            "updatedAt": ""
          }
  - name: 404 Response
    description: Curso no encontrado
    request:
      url: "{{baseUrl}}/api/admin/grade-levels/:id"
      method: DELETE
      params:
        - name: id
          value: ""
          type: path
          description: ID del curso
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "gradeLevelId": "",
            "academicYearId": "",
            "yearLevel": 0,
            "division": "",
            "displayName": "",
            "orientationId": "",
            "orientationName": "",
            "fullDisplayName": "",
            "shift": "",
            "maxStudents": 0,
            "homeroomTeacherId": "",
            "isActive": false,
            "createdAt": "",
            "updatedAt": ""
          }


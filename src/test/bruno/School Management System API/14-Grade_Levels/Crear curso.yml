info:
  name: Crear curso
  type: http
  seq: 3
  tags:
    - Grade_Levels

http:
  method: POST
  url: "{{baseUrl}}/api/admin/grade-levels"
  body:
    type: json
    data: |-
      {
        "academicYearId": "",
        "yearLevel": 0,
        "division": "",
        "orientationId": "",
        "shift": "",
        "maxStudents": 0
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5


    description: Tutor asignado correctamente
    request:
      url: "{{baseUrl}}/api/admin/grade-levels/:id/homeroom-teacher"
      method: PUT
      params:
        - name: id
          value: ""
          type: path
          description: ID del curso
      body:
        type: json
        data: |-
          {
            "teacherId": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "gradeLevelId": "",
            "academicYearId": "",
            "yearLevel": 0,
            "division": "",
            "displayName": "",
            "orientationId": "",

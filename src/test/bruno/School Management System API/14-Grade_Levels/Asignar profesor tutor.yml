info:
  name: Asignar profesor tutor
  type: http
  seq: 1
  tags:
    - Grade_Levels

http:
  method: PUT
  url: "{{baseUrl}}/api/admin/grade-levels/:id/homeroom-teacher"
  params:
    - name: id
      value: ""
      type: path
      description: ID del curso
  body:
    type: json
    data: |-
      {
        "teacherId": ""
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:

info:
  name: Cerrar ciclo lectivo
  type: http
  seq: 1
  tags:
    - Academic_Years

http:
  method: PUT
  url: "{{baseUrl}}/api/admin/academic-years/:id/close"
  params:
    - name: id
      value: ""
      type: path
      description: ID del ciclo lectivo
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Ciclo lectivo cerrado correctamente
    request:
      url: "{{baseUrl}}/api/admin/academic-years/:id/close"
      method: PUT
      params:
        - name: id
          value: ""
          type: path
          description: ID del ciclo lectivo
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "academicYearId": "",
            "year": 0,
            "startDate": "",
            "endDate": "",
            "status": "",
            "createdAt": "",
            "updatedAt": ""
          }
  - name: 404 Response
    description: Ciclo lectivo no encontrado
    request:
      url: "{{baseUrl}}/api/admin/academic-years/:id/close"
      method: PUT
      params:
        - name: id
          value: ""
          type: path
          description: ID del ciclo lectivo
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "academicYearId": "",
            "year": 0,
            "startDate": "",
            "endDate": "",
            "status": "",
            "createdAt": "",
            "updatedAt": ""
          }

docs: Cierra un ciclo lectivo. No puede volverse a abrir.
